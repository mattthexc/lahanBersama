<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LahanBersama - Web Desktop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('lahanApp', () => ({
                isLoggedIn: false, isRegistering: false, username: '', role: 'investor', activeTab: 'marketplace', hasSeenPopup: false,
                lands: [
                    { id: 1, owner: 'Bapak Budi', phone: '6281234567890', location: 'Cisarua, Bogor', size: '500 m²', description: 'Lahan subur bekas kebun sayur, pengairan lancar.', image: 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80', status: 'available', targetFund: 5000000, currentFund: 0, updates: [] },
                    // BUG GAMBAR IBU SITI DIPERBAIKI DI BAWAH INI
                    { id: 2, owner: 'Ibu Siti', phone: '6289876543210', location: 'Lembang, Bandung', size: '1000 m²', description: 'Lahan dataran tinggi, cocok sayuran daun.', image: 'https://images.unsplash.com/photo-1557844352-761f2565b576?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80', status: 'funded', targetFund: 10000000, currentFund: 10000000, cropType: 'Tomat Cherry (800 bibit)', updates: [{ date: '2026-03-20', text: 'Benih disemai di polybag.'}] },
                    { id: 3, owner: 'Mang Oleh', phone: '6289876543211', location: 'Garut, Jabar', size: '2000 m²', description: 'Tanah gembur dekat mata air.', image: 'https://images.unsplash.com/photo-1605000797499-95a51c5269ae?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80', status: 'available', targetFund: 15000000, currentFund: 3500000, updates: [] }
                ],
                selectedLand: null, showFundModal: false, showAddLandModal: false, showUpdateModal: false, showPaymentModal: false, showFertilizerPopup: false,
                newLandLoc: '', newLandSize: '', newLandFund: '', newLandDesc: '',
                selectedCrop: 'c1', quantity: 100, updateText: '', paymentContext: '', paymentAmount: 0, paymentMethod: 'qris',
                cropOptions: [ { id: 'c1', name: 'Jagung Manis', price: 15000 }, { id: 'c2', name: 'Cabai Rawit', price: 20000 }, { id: 'c3', name: 'Tomat Cherry', price: 12000 } ],
                
                init() { this.$watch('activeTab', () => setTimeout(() => { if(window.lucide) lucide.createIcons(); }, 50)); },
                login() { 
                    if(!this.username) this.username = this.isRegistering ? 'Pengguna Baru' : 'Investor'; 
                    this.isLoggedIn = true; 
                    if(this.role === 'investor' && !this.hasSeenPopup) {
                        setTimeout(() => { this.showFertilizerPopup = true; this.hasSeenPopup = true; setTimeout(() => { if(window.lucide) lucide.createIcons(); }, 50); }, 1500);
                    }
                    setTimeout(() => { if(window.lucide) lucide.createIcons(); }, 50); 
                },
                logout() { this.isLoggedIn = false; this.username = ''; this.hasSeenPopup = false; },
                formatRupiah(angka) { return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka || 0); },
                calculateInvestment() { const crop = this.cropOptions.find(c => c.id === this.selectedCrop); return crop ? crop.price * this.quantity : 0; },
                
                openPayment(context, amount) {
                    this.paymentContext = context; this.paymentAmount = amount;
                    this.showFundModal = false; this.showFertilizerPopup = false; this.showPaymentModal = true;
                    setTimeout(() => { if(window.lucide) lucide.createIcons(); }, 50);
                },
                processPayment() {
                    if(this.paymentContext === 'fund') {
                        const cropDetail = this.cropOptions.find(c => c.id === this.selectedCrop);
                        const landIndex = this.lands.findIndex(l => l.id === this.selectedLand.id);
                        this.lands[landIndex].status = 'funded'; this.lands[landIndex].currentFund = this.paymentAmount;
                        this.lands[landIndex].targetFund = this.paymentAmount > this.lands[landIndex].targetFund ? this.paymentAmount : this.lands[landIndex].targetFund;
                        this.lands[landIndex].cropType = `${cropDetail.name} (${this.quantity} bibit)`;
                        this.lands[landIndex].updates.unshift({ date: new Date().toISOString().split('T')[0], text: 'Pendanaan berhasil. Menunggu petani.' });
                        this.selectedLand = null; this.activeTab = 'my-investments';
                    } else if (this.paymentContext === 'fertilizer') {
                        const landIndex = this.lands.findIndex(l => l.id === 2); // Ibu Siti
                        this.lands[landIndex].updates.unshift({ date: new Date().toISOString().split('T')[0], text: 'Pemupukan NPK tambahan telah dilakukan berkat dana investor.' });
                        this.activeTab = 'my-investments';
                    }
                    this.showPaymentModal = false;
                    alert('✅ Pembayaran Berhasil Dikonfirmasi!');
                },
                handleUpdateProgress() {
                    if (!this.updateText) return;
                    const landIndex = this.lands.findIndex(l => l.id === this.selectedLand.id);
                    this.lands[landIndex].updates.unshift({ date: new Date().toISOString().split('T')[0], text: this.updateText });
                    this.showUpdateModal = false; this.updateText = '';
                },
                openUpdateModalFast(land) { this.selectedLand = land; this.showUpdateModal = true; }
            }));
        });
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style> body { background-color: #F8FAFC; } </style>
</head>
<body class="font-sans text-slate-800 antialiased selection:bg-emerald-200" x-data="lahanApp()">

    <div x-show="!isLoggedIn" class="min-h-screen relative flex items-center justify-center overflow-hidden bg-emerald-900">
        <img src="https://images.unsplash.com/photo-1621460244085-3b9187382218?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80" class="absolute inset-0 w-full h-full object-cover opacity-50" />
        <div class="relative z-10 w-full max-w-md px-4">
            <div class="bg-white/90 backdrop-blur-2xl p-10 rounded-[2.5rem] shadow-2xl">
                <div class="text-center mb-8">
                    <div class="w-16 h-16 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-[1.2rem] flex items-center justify-center shadow-lg mx-auto mb-4"><i data-lucide="leaf" class="w-8 h-8 text-white"></i></div>
                    <h1 class="text-3xl font-extrabold text-slate-800">Lahan<span class="text-emerald-600">Bersama</span></h1>
                </div>
                <form @submit.prevent="login" class="space-y-4">
                    <input type="text" x-model="username" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 outline-none focus:border-emerald-500" placeholder="Nama Lengkap" />
                    <select x-model="role" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 outline-none focus:border-emerald-500">
                        <option value="investor">Masuk sbg: Investor</option>
                        <option value="landowner">Masuk sbg: Petani</option>
                    </select>
                    <button type="submit" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold hover:bg-emerald-700 shadow-lg">Masuk Platform</button>
                </form>
            </div>
        </div>
    </div>

    <div x-show="isLoggedIn">
        <nav class="bg-white border-b border-slate-200 sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                <div class="flex items-center gap-3 cursor-pointer" @click="selectedLand = null; activeTab = 'marketplace'">
                    <div class="bg-emerald-100 p-2 rounded-xl text-emerald-600"><i data-lucide="leaf" class="w-6 h-6"></i></div>
                    <span class="text-xl font-extrabold">Lahan<span class="text-emerald-600">Bersama</span></span>
                </div>
                <div x-show="!selectedLand" class="flex bg-slate-100 p-1 rounded-full">
                    <button @click="activeTab = 'marketplace'" :class="activeTab === 'marketplace' ? 'bg-white text-emerald-700 shadow-sm' : 'text-slate-500'" class="px-6 py-2 rounded-full font-bold text-sm">Pasar Lahan</button>
                    <button x-show="role === 'landowner'" @click="activeTab = 'my-lands'" :class="activeTab === 'my-lands' ? 'bg-white text-emerald-700 shadow-sm' : 'text-slate-500'" class="px-6 py-2 rounded-full font-bold text-sm">Lahan Saya</button>
                    <button x-show="role === 'investor'" @click="activeTab = 'my-investments'" :class="activeTab === 'my-investments' ? 'bg-white text-emerald-700 shadow-sm' : 'text-slate-500'" class="px-6 py-2 rounded-full font-bold text-sm">Portofolio</button>
                </div>
                <div class="flex items-center gap-4">
                    <span class="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-xs font-bold" x-text="role === 'investor' ? 'Mode Investor' : 'Mode Petani'"></span>
                    <button @click="logout" class="text-red-500 font-bold text-sm flex items-center gap-1 hover:underline"><i data-lucide="log-out" class="w-4 h-4"></i> Keluar</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-6 py-10">
            <div x-show="!selectedLand">
                <div class="mb-8 flex justify-between items-end">
                    <h1 class="text-4xl font-black text-slate-800" x-text="activeTab === 'marketplace' ? 'Eksplorasi Lahan' : (activeTab === 'my-lands' ? 'Manajemen Lahan' : 'Portofolio Saya')"></h1>
                    <button x-show="activeTab === 'my-lands'" @click="showAddLandModal = true" class="bg-slate-900 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-slate-800 shadow-lg"><i data-lucide="plus" class="w-4 h-4"></i> Lahan Baru</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <template x-for="land in lands.filter(l => activeTab === 'marketplace' ? l.status === 'available' : (activeTab === 'my-investments' ? l.status === 'funded' : (l.owner === username || l.owner === 'Saya' || l.owner === 'Bapak Budi')))" :key="land.id">
                        <div class="bg-white rounded-[2rem] p-3 shadow-sm border border-slate-100 hover:shadow-xl transition-all flex flex-col relative">
                            <div class="relative h-48 rounded-[1.5rem] overflow-hidden cursor-pointer" @click="selectedLand = land">
                                <img :src="land.image" class="w-full h-full object-cover hover:scale-105 transition-transform" />
                                <div class="absolute top-3 right-3"><span :class="land.status === 'available' ? 'bg-white text-emerald-700' : 'bg-blue-500 text-white'" class="px-3 py-1 rounded-full text-xs font-bold shadow-md" x-text="land.status === 'available' ? 'TERBUKA' : 'DIDANAI'"></span></div>
                            </div>
                            <div class="p-4 flex flex-col flex-1">
                                <h3 class="font-bold text-xl mb-1 cursor-pointer hover:text-emerald-600" @click="selectedLand = land" x-text="land.owner"></h3>
                                <p class="text-sm text-slate-500 mb-4" x-text="`${land.location} • ${land.size}`"></p>
                                
                                <div class="mt-auto">
                                    <div class="flex justify-between items-end mb-2">
                                        <span class="text-lg font-black text-slate-800" x-text="formatRupiah(land.targetFund)"></span>
                                        <span class="text-sm font-bold text-emerald-600" x-text="`${Math.round((land.currentFund / land.targetFund) * 100)}%`"></span>
                                    </div>
                                    <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden"><div class="bg-emerald-500 h-full rounded-full" :style="`width: ${(land.currentFund / land.targetFund) * 100}%`"></div></div>
                                    
                                    <template x-if="role === 'landowner' && land.status === 'funded'">
                                        <button @click="openUpdateModalFast(land)" class="w-full mt-4 bg-emerald-50 text-emerald-700 py-2.5 rounded-xl font-bold text-sm flex justify-center items-center gap-2 hover:bg-emerald-100 border border-emerald-200"><i data-lucide="camera" class="w-4 h-4"></i> Update Progres Lahan</button>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="selectedLand">
                <button @click="selectedLand = null" class="mb-6 flex items-center gap-2 text-slate-500 hover:text-slate-800 font-bold"><i data-lucide="arrow-left" class="w-5 h-5"></i> Kembali</button>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 space-y-6">
                        <img :src="selectedLand?.image" class="w-full h-80 object-cover rounded-[2rem] shadow-md" />
                        <div class="bg-white p-8 rounded-[2rem] border border-slate-100">
                            <h2 class="text-3xl font-black mb-2" x-text="`Lahan ${selectedLand?.owner}`"></h2>
                            <p class="text-slate-600 mb-6" x-text="selectedLand?.description"></p>
                            <h3 class="text-xl font-bold mb-4 flex items-center gap-2"><i data-lucide="calendar" class="text-emerald-500"></i> Jurnal Proyek</h3>
                            <div class="space-y-4 border-l-2 border-slate-100 pl-4">
                                <template x-for="(upd, idx) in selectedLand?.updates" :key="idx">
                                    <div class="relative"><div class="absolute -left-[21px] top-1 w-3 h-3 rounded-full bg-emerald-500 border-2 border-white"></div><p class="text-xs font-bold text-emerald-600" x-text="upd.date"></p><p class="text-sm text-slate-600" x-text="upd.text"></p></div>
                                </template>
                                <template x-if="!selectedLand?.updates || selectedLand.updates.length === 0"><p class="text-sm italic text-slate-400">Belum ada progres.</p></template>
                            </div>
                        </div>
                    </div>
                    <div class="lg:col-span-1">
                        <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-xl sticky top-24">
                            <p class="text-xs font-bold text-slate-400 uppercase">Target Dana</p>
                            <h2 class="text-3xl font-black mb-4" x-text="formatRupiah(selectedLand?.targetFund)"></h2>
                            <template x-if="selectedLand?.status === 'available' && role === 'investor'">
                                <button @click="showFundModal = true" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold flex justify-center items-center gap-2 hover:bg-slate-800"><i data-lucide="wallet"></i> Danai Sekarang</button>
                            </template>
                            <template x-if="selectedLand?.status === 'funded'"><div class="bg-emerald-50 p-4 rounded-xl border border-emerald-100"><p class="text-xs font-bold text-emerald-800">Komoditas Aktif:</p><p class="font-black text-slate-800" x-text="selectedLand?.cropType"></p></div></template>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        
        <div x-show="showFertilizerPopup" class="fixed bottom-6 right-6 z-50 animate-in slide-in-from-right duration-500">
            <div class="bg-white p-6 rounded-2xl shadow-2xl border-l-4 border-amber-500 w-80 relative">
                <button @click="showFertilizerPopup = false" class="absolute top-2 right-2 text-slate-400 hover:text-slate-800"><i data-lucide="x" class="w-4 h-4"></i></button>
                <div class="flex gap-3 mb-3"><div class="bg-amber-100 p-2 rounded-full text-amber-600 h-fit"><i data-lucide="alert-triangle" class="w-5 h-5"></i></div>
                <div><h3 class="font-black text-slate-800 text-sm">Peringatan Perawatan!</h3><p class="text-xs text-slate-500 mt-1">Tomat Cherry Anda di Lahan Ibu Siti membutuhkan pupuk NPK bulan ini.</p></div></div>
                <button @click="openPayment('fertilizer', 250000)" class="w-full bg-amber-500 text-white py-2 rounded-lg font-bold text-sm hover:bg-amber-600 shadow-md">Bayar Pupuk (Rp 250.000)</button>
            </div>
        </div>

        <div x-show="showPaymentModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm">
            <div class="bg-white rounded-[2rem] w-full max-w-md p-8 shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-2xl font-black text-slate-800">Pembayaran</h3>
                    <button @click="showPaymentModal = false" class="bg-slate-100 p-2 rounded-full"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
                <div class="bg-slate-50 rounded-xl p-4 mb-6 border border-slate-100 text-center">
                    <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">Total Tagihan</p>
                    <p class="text-3xl font-black text-emerald-600" x-text="formatRupiah(paymentAmount)"></p>
                </div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-3">Pilih Metode Pembayaran</label>
                <div class="space-y-3 mb-8">
                    <label :class="paymentMethod === 'qris' ? 'border-emerald-500 bg-emerald-50' : 'border-slate-200'" class="flex items-center p-4 border-2 rounded-xl cursor-pointer transition-all">
                        <input type="radio" x-model="paymentMethod" value="qris" class="hidden">
                        <div class="w-8 h-8 bg-pink-100 rounded-lg flex items-center justify-center text-pink-600 mr-3"><i data-lucide="qr-code" class="w-5 h-5"></i></div>
                        <span class="font-bold flex-1">QRIS (Otomatis)</span>
                        <div :class="paymentMethod === 'qris' ? 'border-emerald-500' : 'border-slate-300'" class="w-4 h-4 rounded-full border-2 flex items-center justify-center"><div x-show="paymentMethod === 'qris'" class="w-2 h-2 bg-emerald-500 rounded-full"></div></div>
                    </label>
                    <label :class="paymentMethod === 'ewallet' ? 'border-emerald-500 bg-emerald-50' : 'border-slate-200'" class="flex items-center p-4 border-2 rounded-xl cursor-pointer transition-all">
                        <input type="radio" x-model="paymentMethod" value="ewallet" class="hidden">
                        <div class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center text-blue-600 mr-3"><i data-lucide="smartphone" class="w-5 h-5"></i></div>
                        <span class="font-bold flex-1">E-Wallet (GoPay/DANA/OVO)</span>
                        <div :class="paymentMethod === 'ewallet' ? 'border-emerald-500' : 'border-slate-300'" class="w-4 h-4 rounded-full border-2 flex items-center justify-center"><div x-show="paymentMethod === 'ewallet'" class="w-2 h-2 bg-emerald-500 rounded-full"></div></div>
                    </label>
                    <label :class="paymentMethod === 'va' ? 'border-emerald-500 bg-emerald-50' : 'border-slate-200'" class="flex items-center p-4 border-2 rounded-xl cursor-pointer transition-all">
                        <input type="radio" x-model="paymentMethod" value="va" class="hidden">
                        <div class="w-8 h-8 bg-orange-100 rounded-lg flex items-center justify-center text-orange-600 mr-3"><i data-lucide="building" class="w-5 h-5"></i></div>
                        <span class="font-bold flex-1">Virtual Account (Bank)</span>
                        <div :class="paymentMethod === 'va' ? 'border-emerald-500' : 'border-slate-300'" class="w-4 h-4 rounded-full border-2 flex items-center justify-center"><div x-show="paymentMethod === 'va'" class="w-2 h-2 bg-emerald-500 rounded-full"></div></div>
                    </label>
                </div>
                <button @click="processPayment" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-slate-800 shadow-xl">Bayar Sekarang</button>
            </div>
        </div>

        <div x-show="showFundModal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm">
            <div class="bg-white rounded-[2rem] w-full max-w-lg p-8 shadow-2xl">
                <h3 class="text-2xl font-black mb-6">Pilih Komoditas</h3>
                <div class="space-y-3 mb-6">
                    <template x-for="crop in cropOptions" :key="crop.id">
                        <label :class="selectedCrop === crop.id ? 'border-emerald-500 bg-emerald-50' : 'border-slate-200'" class="flex items-center p-4 border-2 rounded-xl cursor-pointer">
                            <input type="radio" x-model="selectedCrop" :value="crop.id" class="hidden">
                            <div class="flex-1"><div class="font-bold" x-text="crop.name"></div><div class="text-xs text-emerald-600 font-bold" x-text="formatRupiah(crop.price)"></div></div>
                        </label>
                    </template>
                </div>
                <label class="block text-xs font-bold mb-2">Jumlah Bibit</label>
                <input type="number" x-model="quantity" class="w-full border p-3 rounded-xl mb-6 font-bold" />
                <div class="flex gap-4">
                    <button @click="showFundModal = false" class="flex-1 bg-slate-100 py-3 rounded-xl font-bold">Batal</button>
                    <button @click="openPayment('fund', calculateInvestment())" class="flex-1 bg-emerald-600 text-white py-3 rounded-xl font-bold">Lanjut Pembayaran</button>
                </div>
            </div>
        </div>

        <div x-show="showUpdateModal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm">
            <div class="bg-white rounded-[2rem] w-full max-w-md p-8 shadow-2xl">
                <h3 class="text-2xl font-black mb-4">Update Progres</h3>
                <p class="text-sm text-slate-500 mb-6">Laporkan perkembangan lahan ke investor.</p>
                <form @submit.prevent="handleUpdateProgress">
                    <div class="border-2 border-dashed border-slate-300 rounded-xl p-6 text-center mb-4 cursor-pointer hover:bg-slate-50"><i data-lucide="camera" class="mx-auto mb-2 text-emerald-500"></i><span class="text-xs font-bold">Unggah Foto</span></div>
                    <textarea x-model="updateText" required class="w-full border rounded-xl p-4 mb-6 text-sm" rows="3" placeholder="Tulis deskripsi progres..."></textarea>
                    <div class="flex gap-4">
                        <button type="button" @click="showUpdateModal = false" class="flex-1 bg-slate-100 py-3 rounded-xl font-bold">Batal</button>
                        <button type="submit" class="flex-1 bg-slate-900 text-white py-3 rounded-xl font-bold">Publikasi</button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</body>
</html>
